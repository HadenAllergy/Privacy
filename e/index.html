<!DOCTYPE html>

<title>Emergency Allergy Alert</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fff;color:#1a1a1a;padding:16px;max-width:480px;margin:0 auto}
.header{background:#d32f2f;color:#fff;padding:20px 16px;border-radius:12px;text-align:center;margin-bottom:16px}
.header h1{font-size:22px;margin-bottom:4px}
.header .sub{font-size:15px;opacity:0.95}
.section{background:#f8f8f8;border-radius:12px;padding:14px 16px;margin-bottom:12px;border-left:4px solid #d32f2f}
.section.epi{border-left-color:#ff6f00}
.section.contacts{border-left-color:#1565c0}
.section.info{border-left-color:#2e7d32}
.section h2{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.section h2.local{color:#d32f2f;font-size:13px;margin-top:4px}
.allergy-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.tag{background:#ffebee;color:#c62828;padding:6px 12px;border-radius:20px;font-size:14px;font-weight:600}
.tag.drug{background:#fff3e0;color:#e65100}
.tag.env{background:#e8f5e9;color:#2e7d32}
.epi-box{background:#fff3e0;padding:12px;border-radius:8px;margin-top:8px}
.epi-box strong{color:#e65100}
.contact{padding:8px 0;border-bottom:1px solid #eee}
.contact:last-child{border-bottom:none}
.contact a{color:#1565c0;text-decoration:none;font-weight:600;font-size:16px}
.call-btn{display:block;background:#d32f2f;color:#fff;text-align:center;padding:16px;border-radius:12px;font-size:18px;font-weight:700;text-decoration:none;margin:16px 0}
.call-btn:active{background:#b71c1c}
.emergency-nums{text-align:center;font-size:13px;color:#666;margin-top:8px;line-height:1.8}
.no-data{text-align:center;padding:60px 20px;color:#999}
.no-data h2{font-size:20px;color:#333;margin-bottom:12px}
.patient-name{font-size:20px;font-weight:700;margin:8px 0 4px}
.blood-type{display:inline-block;background:#e3f2fd;color:#1565c0;padding:4px 10px;border-radius:6px;font-weight:600;font-size:13px}
</style>
</head>
<body>
