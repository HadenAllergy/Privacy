<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0000">
<title>⚠️ MEDICAL EMERGENCY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap');

  :root {
    --red: #e53935;
    --red-dark: #b71c1c;
    --red-glow: rgba(229, 57, 53, 0.3);
    --orange: #ff9800;
    --green: #4caf50;
    --blue: #2196f3;
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --card-border: #2a2a2a;
    --text: #f5f5f5;
    --text-dim: #999;
    --text-bright: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Pulsing red border for urgency */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--red);
    z-index: 1000;
    animation: pulse-bar 1.5s ease-in-out infinite;
  }

  @keyframes pulse-bar {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    padding-top: 20px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 20px;
    animation: fade-in 0.3s ease;
  }

  .header .cross-icon {
    width: 56px; height: 56px;
    background: var(--red);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    box-shadow: 0 0 30px var(--red-glow), 0 0 60px rgba(229,57,53,0.15);
    animation: pulse-glow 2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 30px var(--red-glow), 0 0 60px rgba(229,57,53,0.15); }
    50% { box-shadow: 0 0 40px var(--red-glow), 0 0 80px rgba(229,57,53,0.25); }
  }

  .cross-icon svg { width: 28px; height: 28px; }

  .header h1 {
    font-size: 22px;
    font-weight: 900;
    color: var(--red);
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .header .subtitle {
    font-size: 14px;
    font-weight: 700;
    color: var(--orange);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* LANGUAGE SELECTOR */
  .lang-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 20px;
    padding: 10px;
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--card-border);
  }

  .lang-btn {
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }

  .lang-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .lang-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: white;
    font-weight: 700;
  }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    animation: slide-up 0.4s ease;
  }

  @keyframes slide-up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .card-label.red { color: var(--red); }
  .card-label.blue { color: var(--blue); }
  .card-label.green { color: var(--green); }
  .card-label.orange { color: var(--orange); }

  /* Patient name */
  .patient-name {
    font-size: 24px;
    font-weight: 900;
    color: var(--text-bright);
    margin-bottom: 4px;
  }

  /* Allergy tags */
  .allergy-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .allergy-tag {
    background: rgba(229, 57, 53, 0.15);
    border: 1px solid rgba(229, 57, 53, 0.3);
    color: #ff8a80;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
  }

  /* Epi instructions */
  .epi-card {
    border-left: 3px solid var(--blue);
  }

  .epi-device {
    font-size: 18px;
    font-weight: 900;
    color: var(--text-bright);
    margin-bottom: 6px;
  }

  .epi-steps {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
  }

  /* Emergency call button */
  .call-btn {
    display: block;
    width: 100%;
    padding: 18px;
    background: var(--green);
    color: white;
    font-size: 20px;
    font-weight: 900;
    font-family: inherit;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    margin-bottom: 8px;
    transition: transform 0.1s;
    letter-spacing: 0.5px;
  }

  .call-btn:active { transform: scale(0.98); }

  .call-btn .number {
    font-size: 28px;
    display: block;
    margin-top: 4px;
  }

  .call-btn .local-text {
    font-size: 13px;
    font-weight: 500;
    opacity: 0.9;
  }

  /* Other numbers grid */
  .numbers-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .num-link {
    flex: 1;
    min-width: 70px;
    text-align: center;
    padding: 10px 6px;
    background: rgba(76, 175, 80, 0.1);
    border: 1px solid rgba(76, 175, 80, 0.2);
    border-radius: 10px;
    text-decoration: none;
    transition: background 0.2s;
  }

  .num-link:hover { background: rgba(76, 175, 80, 0.2); }
  .num-link .num { font-size: 16px; font-weight: 900; color: var(--green); display: block; }
  .num-link .region { font-size: 10px; color: var(--text-dim); }

  /* Contacts */
  .contact-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--card-border);
  }

  .contact-row:last-child { border-bottom: none; }

  .contact-name { font-weight: 700; color: var(--text-bright); font-size: 14px; }
  .contact-rel { font-size: 11px; color: var(--text-dim); }

  .contact-phone {
    color: var(--blue);
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
  }

  /* Medical info */
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
  }

  .info-label { color: var(--text-dim); }
  .info-value { color: var(--text-bright); font-weight: 700; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px 0 40px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* No data state */
  .no-data {
    text-align: center;
    padding: 60px 20px;
  }

  .no-data h2 {
    color: var(--red);
    font-size: 20px;
    margin-bottom: 12px;
  }

  .no-data p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
  }

  /* Print styles */
  @media print {
    body { background: white; color: black; }
    .card { border: 2px solid #ccc; }
    .lang-bar { display: none; }
    .call-btn { background: white; color: black; border: 3px solid black; }
  }
</style>

    },
    tr: {
      name: "Türkçe",

      severeAllergyAlert: "CİDDİ ALERJİ UYARISI",

      envAllergies: "ÇEVRESEL ALERJİLER",
      epiInstructions: "İLAÇ TALİMATLARI",
      carries: "TAŞIYOR",
      callEmergency: "ACİL SERVİSİ ARAYIN",
      tapToCall: "Aramak için dokunun",
      otherNumbers: "Diğer acil numaralar",
      emergencyContacts: "ACİL İLETİŞİM KİŞİLERİ",
      physician: "Doktor",
      bloodType: "Kan grubu",

      medicalInfo: "TIBBİ BİLGİ",

    },
    ru: {
      name: "Русский",
      flag: "🇷🇺",

      patient: "Пациент",
      allergies: "АЛЛЕРГИИ",
      foodAllergies: "ПИЩЕВЫЕ АЛЛЕРГИИ",
      drugAllergies: "ЛЕКАРСТВЕННЫЕ АЛЛЕРГИИ",
      envAllergies: "ЭКОЛОГИЧЕСКИЕ",
      epiInstructions: "ИНСТРУКЦИИ ПО ЛЕКАРСТВУ",
      carries: "ПРИ СЕБЕ",
      callEmergency: "ВЫЗОВИТЕ СКОРУЮ ПОМОЩЬ",
      tapToCall: "Нажмите для вызова",
      otherNumbers: "Другие номера экстренных служб",
      emergencyContacts: "ЭКСТРЕННЫЕ КОНТАКТЫ",
      physician: "Врач",
      bloodType: "Группа крови",
      medicalNotes: "Медицинские заметки",
      medicalInfo: "МЕДИЦИНСКАЯ ИНФОРМАЦИЯ",
      callNow: "ПОЗВОНИТЬ",
      poweredBy: "Экстренные данные Haden Allergy"
    }
  };

  // ═══════════════════════════════════════════
  // EMERGENCY NUMBERS BY COUNTRY
  // ═══════════════════════════════════════════
  const EMERGENCY_NUMBERS = {
    US: "911", CA: "911", GB: "999", IE: "999", AU: "000", NZ: "111",
    JP: "119", KR: "119", CN: "120", TW: "119",
    DE: "112", FR: "15", ES: "112", IT: "112", NL: "112", BE: "112",
    AT: "112", CH: "144", SE: "112", NO: "113", DK: "112", FI: "112",
    PT: "112", GR: "166", TR: "112", IL: "101",
    SA: "997", AE: "998", IN: "108", TH: "1669", SG: "995",
    MY: "999", PH: "911", MX: "911", BR: "192", AR: "107",
    ZA: "10177", EG: "123", RU: "103"
  };

  const FALLBACK_NUMBERS = [
    { num: "911", label: "🇺🇸 US/CA" },
    { num: "999", label: "🇬🇧 UK" },
    { num: "112", label: "🇪🇺 EU" },
    { num: "000", label: "🇦🇺 AU" },
    { num: "119", label: "🇯🇵 JP" }
  ];

  // ═══════════════════════════════════════════
  // EPINEPHRINE INSTRUCTIONS (translated)
  // Only showing English — the device instructions are universal
  // (physical actions transcend language, but we translate the intro)
  // ═══════════════════════════════════════════
  const EPI_INSTRUCTIONS = {
    epipen: "Remove blue cap → Press orange tip firmly against outer mid-thigh → Hold 10 seconds",
    epipen_jr: "Remove blue cap → Press orange tip firmly against outer mid-thigh → Hold 10 seconds",
    auvi_q: "Pull off red cap → Press black end against outer mid-thigh → Hold 5 seconds (device talks you through it)",
    auvi_q_jr: "Pull off red cap → Press black end against outer mid-thigh → Hold 5 seconds (device talks you through it)",
    neffy: "Remove cap → Insert nozzle into one nostril → Press plunger firmly",
    anapen: "Remove black cap → Remove grey safety cap → Press against outer mid-thigh → Hold 10 seconds",
    jext: "Remove yellow cap → Press black tip against outer mid-thigh → Hold 10 seconds"
  };

  const EPI_NAMES = {
    epipen: "EpiPen (0.3mg)", epipen_jr: "EpiPen Jr (0.15mg)",
    auvi_q: "Auvi-Q (0.3mg)", auvi_q_jr: "Auvi-Q Jr (0.15mg)",
    neffy: "neffy (nasal spray)", anapen: "Anapen", jext: "Jext"
  };

  // ═══════════════════════════════════════════
  // PARSE PATIENT DATA FROM URL
  // ═══════════════════════════════════════════
  function parsePatientData() {
    try {
      // Data comes in URL hash as base64-encoded JSON
      const hash = window.location.hash.substring(1);
      if (!hash) return null;
      const json = atob(decodeURIComponent(hash));
      return JSON.parse(json);
    } catch (e) {
      // Try query params as fallback
      try {
        const params = new URLSearchParams(window.location.search);
        const data = params.get('d');
        if (data) {
          return JSON.parse(atob(decodeURIComponent(data)));
        }
      } catch (e2) {}
      return null;
    }
  }

  // ═══════════════════════════════════════════
  // DETECT LANGUAGE
  // ═══════════════════════════════════════════
  function detectLanguage() {
    const urlParams = new URLSearchParams(window.location.search);
    const urlLang = urlParams.get('lang');
    if (urlLang && T[urlLang]) return urlLang;

    const browserLangs = navigator.languages || [navigator.language];
    for (const lang of browserLangs) {
      const code = lang.substring(0, 2).toLowerCase();
      if (T[code]) return code;
    }
    return 'en';
  }

  // ═══════════════════════════════════════════
  // DETECT LOCAL EMERGENCY NUMBER
  // ═══════════════════════════════════════════
  function getLocalEmergencyNumber(callback) {
    // Try timezone-based detection first (no permissions needed)
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
    const tzCountry = guessCountryFromTimezone(tz);
    if (tzCountry && EMERGENCY_NUMBERS[tzCountry]) {
      callback(EMERGENCY_NUMBERS[tzCountry], tzCountry);
      return;
    }
    callback("911", "US"); // Default
  }

  function guessCountryFromTimezone(tz) {
    const map = {
      'America/New_York': 'US', 'America/Chicago': 'US', 'America/Denver': 'US',
      'America/Los_Angeles': 'US', 'America/Phoenix': 'US', 'America/Anchorage': 'US',
      'Pacific/Honolulu': 'US', 'America/Toronto': 'CA', 'America/Vancouver': 'CA',
      'Europe/London': 'GB', 'Europe/Dublin': 'IE',
      'Australia/Sydney': 'AU', 'Australia/Melbourne': 'AU', 'Australia/Brisbane': 'AU',
      'Australia/Perth': 'AU', 'Pacific/Auckland': 'NZ',
      'Asia/Tokyo': 'JP', 'Asia/Seoul': 'KR', 'Asia/Shanghai': 'CN', 'Asia/Taipei': 'TW',
      'Europe/Berlin': 'DE', 'Europe/Paris': 'FR', 'Europe/Madrid': 'ES',
      'Europe/Rome': 'IT', 'Europe/Amsterdam': 'NL', 'Europe/Brussels': 'BE',
      'Europe/Vienna': 'AT', 'Europe/Zurich': 'CH', 'Europe/Stockholm': 'SE',
      'Europe/Oslo': 'NO', 'Europe/Copenhagen': 'DK', 'Europe/Helsinki': 'FI',
      'Europe/Lisbon': 'PT', 'Europe/Athens': 'GR', 'Europe/Istanbul': 'TR',
      'Asia/Jerusalem': 'IL', 'Asia/Riyadh': 'SA', 'Asia/Dubai': 'AE',
      'Asia/Kolkata': 'IN', 'Asia/Bangkok': 'TH', 'Asia/Singapore': 'SG',
      'Asia/Kuala_Lumpur': 'MY', 'Asia/Manila': 'PH',
      'America/Mexico_City': 'MX', 'America/Sao_Paulo': 'BR', 'America/Argentina/Buenos_Aires': 'AR',
      'Africa/Johannesburg': 'ZA', 'Africa/Cairo': 'EG', 'Europe/Moscow': 'RU'
    };
    return map[tz] || null;
  }

  // ═══════════════════════════════════════════
  // RENDER PAGE
  // ═══════════════════════════════════════════
  let currentLang = detectLanguage();
  const patientData = parsePatientData();

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function render() {
    const t = T[currentLang];
    const app = document.getElementById('app');
    const isRTL = currentLang === 'ar';

    if (!patientData) {
      app.innerHTML = `
        <div class="no-data">
          <div class="header">
            <div class="cross-icon">
              <svg viewBox="0 0 24 24" fill="none"><rect x="10" y="3" width="4" height="18" rx="1" fill="white"/><rect x="3" y="10" width="18" height="4" rx="1" fill="white"/></svg>
            </div>
            <h1>${esc(t.medEmergency)}</h1>
          </div>
          <p style="color:var(--text-dim);font-size:14px;line-height:1.6">
            No patient data found. This QR code may have expired or been generated incorrectly.
            <br><br>
            If this is a medical emergency, call your local emergency number immediately.
          </p>
          <div style="margin-top:20px" id="fallback-calls"></div>
        </div>`;
      renderFallbackCalls();
      return;
    }

    const p = patientData;
    let html = '';

    // Set RTL if Arabic
    app.style.direction = isRTL ? 'rtl' : 'ltr';

    // Header
    html += `
      <div class="header">
        <div class="cross-icon">
          <svg viewBox="0 0 24 24" fill="none"><rect x="10" y="3" width="4" height="18" rx="1" fill="white"/><rect x="3" y="10" width="18" height="4" rx="1" fill="white"/></svg>
        </div>
        <h1>${esc(t.medEmergency)}</h1>
        <div class="subtitle">${esc(t.severeAllergyAlert)}</div>
      </div>`;

    // Language selector
    html += '<div class="lang-bar">';
    for (const [code, lang] of Object.entries(T)) {
      const active = code === currentLang ? ' active' : '';
      html += `<button class="lang-btn${active}" onclick="window.switchLang('${code}')">${lang.flag} ${lang.name}</button>`;
    }
    html += '</div>';

    // Patient name
    if (p.name) {
      html += `
        <div class="card">
          <div class="card-label red">${esc(t.patient)}</div>
          <div class="patient-name">${esc(p.name)}</div>
        </div>`;
    }

    // Allergies
    const allAllergies = [
      ...(p.foodAllergies || []),
      ...(p.drugAllergies || []),
      ...(p.environmentalAllergies || [])
    ];

    if (allAllergies.length > 0) {
      html += `<div class="card">
        <div class="card-label red">${esc(t.allergies)}</div>`;

      if (p.foodAllergies && p.foodAllergies.length) {
        html += `<div style="font-size:11px;font-weight:700;color:var(--text-dim);margin-bottom:4px;margin-top:4px">${esc(t.foodAllergies)}</div>
        <div class="allergy-tags">${p.foodAllergies.map(a => `<span class="allergy-tag">${esc(a)}</span>`).join('')}</div>`;
      }
      if (p.drugAllergies && p.drugAllergies.length) {
        html += `<div style="font-size:11px;font-weight:700;color:var(--text-dim);margin-bottom:4px;margin-top:10px">${esc(t.drugAllergies)}</div>
        <div class="allergy-tags">${p.drugAllergies.map(a => `<span class="allergy-tag">${esc(a)}</span>`).join('')}</div>`;
      }
      if (p.environmentalAllergies && p.environmentalAllergies.length) {
        html += `<div style="font-size:11px;font-weight:700;color:var(--text-dim);margin-bottom:4px;margin-top:10px">${esc(t.envAllergies)}</div>
        <div class="allergy-tags">${p.environmentalAllergies.map(a => `<span class="allergy-tag">${esc(a)}</span>`).join('')}</div>`;
      }
      html += '</div>';
    }

    // Epinephrine / medication instructions
    if (p.carriesEpinephrine && p.epinephrineDevice) {
      const device = p.epinephrineDevice;
      const deviceName = EPI_NAMES[device] || device;
      const instructions = EPI_INSTRUCTIONS[device] || '';
      html += `
        <div class="card epi-card">
          <div class="card-label blue">💉 ${esc(t.epiInstructions)}</div>
          <div class="epi-device">${esc(t.carries)}: ${esc(deviceName)}</div>
          <div class="epi-steps">${esc(instructions)}</div>
        </div>`;
    }

    // Emergency call button
    html += `<div class="card" style="padding:12px" id="call-section">
      <div class="card-label green">${esc(t.callEmergency)}</div>
      <div id="primary-call"></div>
      <div class="numbers-grid" id="other-numbers"></div>
    </div>`;

    // Emergency contacts
    if (p.emergencyContacts && p.emergencyContacts.length) {
      html += `<div class="card">
        <div class="card-label orange">${esc(t.emergencyContacts)}</div>`;
      for (const c of p.emergencyContacts) {
        const phone = (c.phone || '').replace(/\s/g, '');
        html += `
          <div class="contact-row">
            <div>
              <div class="contact-name">${esc(c.name)}</div>
              <div class="contact-rel">${esc(c.relationship)}</div>
            </div>
            <a href="tel:${esc(phone)}" class="contact-phone">📞 ${esc(c.phone)}</a>
          </div>`;
      }
      html += '</div>';
    }

    // Medical info
    const hasInfo = p.bloodType || p.physicianName || p.medicalNotes;
    if (hasInfo) {
      html += `<div class="card">
        <div class="card-label blue">${esc(t.medicalInfo)}</div>`;
      if (p.bloodType) html += `<div class="info-row"><span class="info-label">${esc(t.bloodType)}</span><span class="info-value">${esc(p.bloodType)}</span></div>`;
      if (p.physicianName) html += `<div class="info-row"><span class="info-label">${esc(t.physician)}</span><span class="info-value">${esc(p.physicianName)} ${p.physicianPhone ? esc(p.physicianPhone) : ''}</span></div>`;
      if (p.medicalNotes) html += `<div class="info-row" style="flex-direction:column"><span class="info-label">${esc(t.medicalNotes)}</span><span class="info-value" style="margin-top:4px">${esc(p.medicalNotes)}</span></div>`;
      html += '</div>';
    }

    // Footer
    html += `<div class="footer">${esc(t.poweredBy)}<br>hadenallergy.com</div>`;

    app.innerHTML = html;

    // Render emergency numbers with geolocation
    getLocalEmergencyNumber(function(localNum, countryCode) {
      const primaryEl = document.getElementById('primary-call');
      const othersEl = document.getElementById('other-numbers');

      if (primaryEl) {
        primaryEl.innerHTML = `
          <a href="tel:${localNum}" class="call-btn">
            <span class="local-text">${esc(t.tapToCall)}</span>
            <span class="number">${localNum}</span>
          </a>`;
      }

      if (othersEl) {
        const others = FALLBACK_NUMBERS.filter(n => n.num !== localNum);
        othersEl.innerHTML = others.map(n =>
          `<a href="tel:${n.num}" class="num-link"><span class="num">${n.num}</span><span class="region">${n.label}</span></a>`
        ).join('');
      }
    });
  }

  function renderFallbackCalls() {
    const el = document.getElementById('fallback-calls');
    if (!el) return;
    el.innerHTML = FALLBACK_NUMBERS.map(n =>
      `<a href="tel:${n.num}" class="call-btn" style="margin-bottom:8px">${n.label}<span class="number">${n.num}</span></a>`
    ).join('');
  }

  // Global function for language switching
  window.switchLang = function(code) {
    currentLang = code;
    document.documentElement.lang = code;
    render();
  };

  // Initial render
  render();

})();
</script>
